global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "life-gamified-backend"
    metrics_path: /api/health
    static_configs:
      - targets: ["backend:3001"]
    scrape_interval: 30s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
