global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "life-gamified-backend"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["backend:3001"]
        labels:
          service: backend
          environment: local
    scrape_interval: 15s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
